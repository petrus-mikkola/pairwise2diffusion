device:
  precision_double: false #use float64 precision
  device: cpu
exp:
  exp_id: llm
  seed: 1
  target: llm_prior
  d: 8
  rum_noise_dist: NA #exponential, gumbel
  s: 0.7797 #Exp(s) noise or Gumbel(0,s) noise    default s=1.0 in Exp, and s=0.7797 in Gumbel
  q_dist: uniform #uniform, target, mixture_gaussian (which is essentially gaussian as both components have same mean and covariance)
  mixture_probs: NA #mixture probabilities for mixture of Gaussian for q_dist
data:
  k: 2 #the cardinaility of each choice set
  n: 220 #the total number of comparisons (when k=2) or rankings (when k>2)
  transform2unitcube: false
method:
  name: EDM
  sigma_dist: lognormal #uniform, lognormal
  sigma_min: 0.002 #0.002, Minimum noise level in diffusion
  sigma_max: 2.0 #edm default 5.0, Maximum noise level in diffusion, should be >>sigma_data  (in normalized [-0.5,0.5]^d typically 1/12=0.0833 along each axis,in twomoon sigma_data = [1.8937, 0.8349], compare that EDMtoy: sigma_data = 0.5 along each axis)
  P_mean: -2.1 #log(sigma) ~ N(P_mean,P_std) #edm 2D toy -2.3   
  P_std: 1.0 #log(sigma) ~ N(P_mean,P_std)  #edm 2D toy 1.5
  phi: 0.5 #mixture probability for sampling the ALD noise schedule (cosine)
  langevin_L: 40 #Number of noise levels for annealead Langevin dynamics
  langevin_T: 50 #Number of iterations per noise-level
  langevin_epsilon: 0.15 #Reference step-size
  ema_std: 0.01 #simga_ref in (Karras et al, 2024), upper bound is 0.2886, and edm 2d toy is 0.01, in scorepref 0.05 is good default value
model:
  name: EDMtoy
  num_layers: 4 #same as EDMtoy denoisers D_0 and D_1
  hidden_dim: 32 #same as EDMtoy denoiser conditional D_1, i.e. high-fidelity model (needs to be divisible by 4)
  num_layers_marginal: 4
  hidden_dim_marginal: 32
optimization:
  max_iter: 12288
  max_iter_marginal:  12288
  batch_size: 220
  batch_size_marginal: 220
  lr_ref: 5e-4
  lr_ref_marginal: 5e-4
  lr_iter: null #if null (i.e. python None) then EDM type learning rate decay assumed
  lr_iter_marginal: null
  tau_batch_size: 8
  tau_lr: 5e-4
  tau_max_iter: 25000
  tau_max_weight_decay: 1e-3
plot:
  showduringtraining: false #works only when run as notebook
  showdatapoints: false #works only when run as notebook
  show_iter: 400000 #note that changing this: more/less RNG draws = different training batches = different results
  grid_size: 400
  nsamples: 40000 #samples from the learnd model for plotting
  wasserstein_nsamples: 10
  progressbar_show: false